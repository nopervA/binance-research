- id: H001
  title: "Extreme OFI carries predictive information about 5-minute forward mid-price returns"
  registered: "2026-06-17T00:00:00Z"
  status: registered
  research_question_type: predictive_information
  explicit_scope_note: >
    H001 tests whether extreme OFI z-score events contain predictive
    information about subsequent mid-price movement. It does not test
    tradability, execution feasibility, net profitability after fees,
    or deployable strategy performance.
  hypothesis:
    trigger: "OFI z-score crosses +/-1.5"
    outcome: "300-second forward mid-price return"
    direction: "same sign as triggering event"
  parameters:
    symbol: BTCUSDT
    ofi_window_seconds: 60
    zscore_lookback_seconds: 3600
    threshold: 1.5
    cooldown_seconds: 300
    primary_horizon_seconds: 300
    secondary_horizon_seconds:
      - 60
  sample_requirements:
    minimum_events: 300
    target_days: 14
  statistical_test:
    primary_metric:
      name: signed_return
      definition: signed_return_i = direction_i * forward_return_i
      direction_i:
        long: +1
        short: -1
    primary_test:
      method: bootstrap_confidence_interval
      confidence_level: 0.95
      n_bootstrap: 10000
    pass_condition:
      rule: bootstrap_95ci_lower_bound > 0
      evaluated_on:
        symbol: BTCUSDT
        threshold: 1.5
        horizon_seconds: 300
    secondary_reporting_only:
      - t_test_pvalue
      - direction_accuracy
      - median_signed_return
      - mean_signed_return
      - estimated_fee_impact
  robustness_checks:
    interpretive_only: true
    checks:
      - remove_top_5_abs_signed_returns
      - threshold_2_0
      - threshold_3_0
      - cross_symbol_ethusdt
  overall_pass_rule: >
    H001 passes if the primary bootstrap CI lower bound is greater than
    zero on the primary specification (BTCUSDT, threshold=1.5,
    horizon=300 seconds). Robustness checks are reported alongside the
    result but do not determine pass/fail.
  notes: >
    Threshold selected via 3 symbols x 3 days sanity check.
    Event counts were stable across symbols and dates.
    Statistical test design finalized before execution; see
    decisions/2026-06-17-h001-statistical-test-design.md.
  status: completed

result: PASS

result_file: results/H001_20260618_141550.md

result_summary: >
  Bootstrap CI [0.00001063, 0.00022332], mean signed_return
  0.00011531, n=634 valid events. Positive predictive information
  detected on BTCUSDT. Result remained positive under threshold
  variation (1.5, 2.0, 3.0), outlier removal, and ETHUSDT
  cross-symbol validation. Tradability was not assessed.
